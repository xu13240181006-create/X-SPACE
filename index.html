const STORAGE_KEY = 'panic_signal_params_v1';

function loadParams(){

      return {

  };
}

function saveParams(){

}

function parse(a){return a.map(x=>({date:x[0],price:x[1],sentiment:x[2]}));}

function getEcon(date){
  let yc=null,hy=null,lei=null;
  for(let m=0;m<4;m++){const dt=new Date(date);dt.setMonth(dt.getMonth()-m);const k=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
    if(yc===null&&ECON_YC[k]!==undefined)yc=ECON_YC[k];if(hy===null&&ECON_HY[k]!==undefined)hy=ECON_HY[k];if(lei===null&&ECON_LEI[k]!==undefined)lei=ECON_LEI[k];}
  let score=3,flags=[],details=[];
  if(yc!==null){if(yc<0){score--;flags.push("倒挂");details.push("YC"+yc.toFixed(2)+"→-1");}else details.push("YC"+yc.toFixed(2));}
  if(hy!==null){if(hy>6){score--;flags.push("HY高");details.push("HY"+hy.toFixed(1)+"→-1");}else if(hy>5){score-=0.5;flags.push("HY偏高");details.push("HY"+hy.toFixed(1)+"→-0.5");}else details.push("HY"+hy.toFixed(1));}
  if(lei!==null){if(lei<0){score--;flags.push("LEI负");details.push("LEI"+lei.toFixed(2)+"→-1");}else if(lei<0.5){score-=0.5;flags.push("LEI弱");details.push("LEI"+lei.toFixed(2)+"→-0.5");}else details.push("LEI"+lei.toFixed(1));}
  return{yc,hy,lei,score:Math.max(0,score),flags,details};
}

function addMA(data,period){
  for(let i=0;i<data.length;i++){
    if(i<period-1)data[i].ma=data[i].price;
    else{let s=0;for(let j=i-period+1;j<=i;j++)s+=data[j].price;data[i].ma=s/period;}
    data[i].bull=data[i].price>=data[i].ma;
    let rb=false;for(let j=0;j<Math.min(13,i+1);j++)if(data[i-j]&&data[i-j].bull)rb=true;
    data[i].recentBull=rb;
  }
}

function computeSentiment(data,lookback=10){
  const n=data.length;
  for(let i=Math.max(0,n-5);i<n;i++){
    if(i<lookback){data[i].sentiment=50;continue;}
    const mom=(data[i].price-data[i-lookback].price)/data[i-lookback].price;
    let volSum=0;for(let j=i-lookback+1;j<=i;j++){const r=(data[j].price-data[j-1].price)/data[j-1].price;volSum+=r*r;}
    const vol=Math.sqrt(volSum/lookback);
    let momRank=0,volRank=0,cnt=0;
    for(let j=lookback;j<=i;j++){
      const m2=(data[j].price-data[j-lookback].price)/data[j-lookback].price;
      let v2=0;for(let k=j-lookback+1;k<=j;k++){const r2=(data[k].price-data[k-1].price)/data[k-1].price;v2+=r2*r2;}v2=Math.sqrt(v2/lookback);
      if(m2<mom)momRank++;if(v2<vol)volRank++;cnt++;
    }
    if(cnt>0){const mp=momRank/cnt*100,vp=100-volRank/cnt*100;data[i].sentiment=Math.max(0,Math.min(100,Math.round(mp*0.6+vp*0.4)));}
    else data[i].sentiment=50;
  }
}

function recalcSentiment(data,lookback=10){
  // Find where new data starts (sentinel sentiment=50 after lookback period)
  var startIdx=data.length;
  for(var i=data.length-1;i>=lookback;i--){
    if(data[i].sentiment===50)startIdx=i;
    else break;
  }
  if(startIdx>=data.length)return; // nothing to recalculate
  // Recalculate from startIdx
  for(var i=startIdx;i<data.length;i++){
    if(i<lookback){data[i].sentiment=50;continue;}
    var mom=(data[i].price-data[i-lookback].price)/data[i-lookback].price;
    var volSum=0;for(var j=i-lookback+1;j<=i;j++){var r=(data[j].price-data[j-1].price)/data[j-1].price;volSum+=r*r;}
    var vol=Math.sqrt(volSum/lookback);
    var momRank=0,volRank=0,cnt=0;
    for(var j=lookback;j<=i;j++){
      var m2=(data[j].price-data[j-lookback].price)/data[j-lookback].price;
      var v2=0;for(var k=j-lookback+1;k<=j;k++){var r2=(data[k].price-data[k-1].price)/data[k-1].price;v2+=r2*r2;}v2=Math.sqrt(v2/lookback);
      if(m2<mom)momRank++;if(v2<vol)volRank++;cnt++;
    }
    if(cnt>0){var mp=momRank/cnt*100,vp=100-volRank/cnt*100;data[i].sentiment=Math.max(0,Math.min(100,Math.round(mp*0.6+vp*0.4)));}
    else data[i].sentiment=50;
  }
}

// ════════════════════════════════════════
// CORE: BTC-specific functions
// ════════════════════════════════════════
function calcWeeklyRSI(data, period=14){
  // Calculate RSI on weekly closes
  for(let i=0;i<data.length;i++){
    if(i<period){data[i].rsi=50;continue;}
    let gains=0,losses=0;
    for(let j=i-period+1;j<=i;j++){
      const chg=data[j].price-data[j-1].price;
      if(chg>0)gains+=chg;else losses-=chg;
    }
    const avgGain=gains/period,avgLoss=losses/period;
    if(avgLoss===0){data[i].rsi=100;continue;}
    const rs=avgGain/avgLoss;
    data[i].rsi=Math.round(100-100/(1+rs));
  }
}

function calcAhr999(data){
  // ahr999 = (price / 200-day geometric mean) * (price / log regression estimate)
  // For weekly data: 200 days ≈ 29 weeks
  const gmaWeeks=29;
  for(let i=0;i<data.length;i++){
    if(i<gmaWeeks){data[i].ahr999=null;continue;}
    // Geometric mean of last 29 weeks
    let logSum=0;
    for(let j=i-gmaWeeks+1;j<=i;j++)logSum+=Math.log(data[j].price);
    const gma=Math.exp(logSum/gmaWeeks);
    // Log regression estimate: price = 10^(a * log10(days) + b)
    // Fitted params (approximate from BTC history since 2009)
    const daysSinceGenesis=Math.round((new Date(data[i].date)-BTC_GENESIS)/86400000);
    if(daysSinceGenesis<=0){data[i].ahr999=null;continue;}
    const logDays=Math.log10(daysSinceGenesis);
    const estimatedPrice=Math.pow(10, 5.84 * logDays - 17.01);
    // ahr999 = (price/gma) * (price/estimated)
    const ahr=(data[i].price/gma)*(data[i].price/estimatedPrice);
    data[i].ahr999=Math.round(ahr*100)/100;
  }
}

function addMA200w(data){
  for(let i=0;i<data.length;i++){
    if(i<199)data[i].ma200w=data[i].price;
    else{let s=0;for(let j=i-199;j<=i;j++)s+=data[j].price;data[i].ma200w=s/200;}
    data[i].nearMA200w=data[i].price<=data[i].ma200w*1.2;
  }
}

function findSignals_stock(data,p){
  for(let i=0;i<data.length;i++){const start=Math.max(0,i-52);let hi=0;for(let j=start;j<=i;j++)hi=Math.max(hi,data[j].price);data[i].dd=(data[i].price-hi)/hi*100;}
  const signals=[],filtered=[];let last=-p.cool-1;
  for(let i=10;i<data.length;i++){const d=data[i];
    if(d.sentiment<=p.sent&&d.dd<=-p.dd&&(i-last)>p.cool){
      const future={};[[4,"1月"],[13,"3月"],[26,"半年"],[52,"1年"]].forEach(([w,l])=>{if(i+w<data.length)future[l]=Math.round((data[i+w].price-d.price)/d.price*1000)/10;else future[l]=null;});
      const ec=getEcon(d.date);
      const sig={idx:i,date:d.date,price:d.price,sent:d.sentiment,dd:Math.round(d.dd*10)/10,bull:d.bull,recentBull:d.recentBull,econ:ec.score,flags:ec.flags,details:ec.details,yc:ec.yc,hy:ec.hy,lei:ec.lei,future};
      let reject=false,reasons=[],blockedLayers=[];
      if(p.useMA&&!d.recentBull){reject=true;reasons.push("深熊");blockedLayers.push("均线");}
      if(p.useEcon&&ec.score<2){reject=true;reasons.push(ec.flags.join("+"));blockedLayers.push("经济");}
      sig.reject=reject;sig.reasons=reasons;sig.blockedLayers=blockedLayers;
      if(reject)filtered.push(sig);else signals.push(sig);last=i;
    }
  }
  return{signals,filtered};
}

function findSignals_btc(data,p){
  calcWeeklyRSI(data);calcAhr999(data);addMA200w(data);
  for(let i=0;i<data.length;i++){const start=Math.max(0,i-52);let hi=0;for(let j=start;j<=i;j++)hi=Math.max(hi,data[j].price);data[i].dd=(data[i].price-hi)/hi*100;}
  const signals=[],filtered=[];let last=-p.cool-1;
  for(let i=30;i<data.length;i++){const d=data[i];
    if(d.rsi<=p.rsi&&d.dd<=-p.dd&&(i-last)>p.cool){
      const future={};[[4,"1月"],[13,"3月"],[26,"半年"],[52,"1年"]].forEach(([w,l])=>{if(i+w<data.length)future[l]=Math.round((data[i+w].price-d.price)/d.price*1000)/10;else future[l]=null;});
      const sig={idx:i,date:d.date,price:d.price,rsi:d.rsi,dd:Math.round(d.dd*10)/10,
        ahr999:d.ahr999,ma200w:Math.round(d.ma200w),nearMA200w:d.nearMA200w,future};
      let reject=false,reasons=[],blockedLayers=[];
      if(p.ma200w&&!d.nearMA200w){reject=true;reasons.push("远离200周线");blockedLayers.push("200周线");}
      if(d.ahr999!==null&&d.ahr999>=p.ahr999){reject=true;reasons.push("ahr999="+d.ahr999);blockedLayers.push("ahr999");}
      sig.reject=reject;sig.reasons=reasons;sig.blockedLayers=blockedLayers;
      if(reject)filtered.push(sig);else signals.push(sig);last=i;
    }
  }
  return{signals,filtered};
}

function getStatus_stock(data, livePrice, p){
  const d=data.map(x=>({...x}));
  if(livePrice){d.push({date:new Date().toISOString().split('T')[0],price:livePrice,sentiment:50});computeSentiment(d);}
  addMA(d,p.ma);
  const last=d[d.length-1];
  const start=Math.max(0,d.length-52);let hi52=0;for(let i=start;i<d.length;i++)hi52=Math.max(hi52,d[i].price);
  const dd=(last.price-hi52)/hi52*100;
  const ec=getEcon(last.date);
  const sentOk=last.sentiment<=p.sent,ddOk=dd<=-p.dd,maOk=!p.useMA||last.recentBull,econOk=!p.useEcon||ec.score>=2;
  let signal='safe',reason='';
  if(sentOk&&ddOk){if(maOk&&econOk){signal='fire';reason='🔥 信号触发！';}else{signal='blocked';const b=[];if(!maOk)b.push('均线');if(!econOk)b.push('经济');reason='⛔ 拦截: '+b.join('+');}}
  else if(last.sentiment<=p.sent+10&&dd<=-(p.dd-3)){signal='near';reason='⚠️ 接近触发';}
  else{signal='safe';reason='😴 无信号';}
  return{price:last.price,signal,reason,conds:[
    {name:'情绪',ok:sentOk,val:last.sentiment,detail:'≤'+p.sent},
    {name:'回撤',ok:ddOk,val:dd.toFixed(1)+'%',detail:'≥'+p.dd+'%'},
    {name:'均线',ok:maOk,val:last.recentBull?'上方':'下方',detail:p.ma+'周'},
    {name:'经济',ok:econOk,val:ec.score.toFixed(1)+'分',detail:ec.flags.length?ec.flags.join(' '):'健康'}
  ]};
}

function getStatus_btc(data, livePrice, p){
  const d=data.map(x=>({...x}));

  const rsiOk=last.rsi<=p.rsi,ddOk=dd<=-p.dd,maOk=!p.ma200w||last.nearMA200w,ahrOk=last.ahr999===null||last.ahr999<p.ahr999;
  let signal='safe',reason='';

  return{price:last.price,signal,reason,conds:[

let histLastFetch=0;
async function fetchRecentWeekly(){
  const now=Date.now();
  if(now-histLastFetch<3600*1000&&histLastFetch>0)return{updated:0};
  
  let updated=0;
  const proxies=['https://corsproxy.io/?url=','https://api.allorigins.win/raw?url='];
  
  // SPY & QQQ: Yahoo Finance weekly data (last 6 months)
  for(const sym of ['SPY','QQQ']){
    const yfUrl='https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'?range=6mo&interval=1wk';
    for(const px of proxies){
      try{
        const ctrl=new AbortController();
        const timer=setTimeout(function(){ctrl.abort();},8000);
        const r=await fetch(px+encodeURIComponent(yfUrl),{signal:ctrl.signal});
        clearTimeout(timer);
        if(!r.ok)continue;
        const j=await r.json();
        if(j&&j.chart&&j.chart.result&&j.chart.result[0]){
          const res=j.chart.result[0];
          const ts=res.timestamp;
          const closes=res.indicators&&res.indicators.quote&&res.indicators.quote[0]?res.indicators.quote[0].close:null;
          if(ts&&closes&&ts.length===closes.length){
            var merged=mergeWeekly(RAW[sym],ts,closes);
            if(merged>0){updated++;fetchLog.push('✓ '+sym+' +'+merged+'周');}
          }
          break;
        }
      }catch(e){}
    }
  }
  
  // BTC: CoinGecko daily data (last 180 days), convert to weekly
  try{
    var j=await tryFetch('https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=180&interval=daily');
    if(j&&j.prices){
      var weekMap={};
      j.prices.forEach(function(p){
        var dt=new Date(p[0]);
        var key=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
        var yr=dt.getFullYear();
        var wk=Math.ceil((((dt-new Date(yr,0,1))/86400000)+new Date(yr,0,1).getDay()+1)/7);
        var wkey=yr+'-'+String(wk).padStart(2,'0');
        weekMap[wkey]={date:key,price:Math.round(p[1]*100)/100};
      });
      // Get last embedded date
      var lastDate=RAW.BTC.length>0?RAW.BTC[RAW.BTC.length-1][0]:'2000-01-01';
      var added=0;
      Object.keys(weekMap).sort().forEach(function(wk){
        var w=weekMap[wk];
        if(w.date>lastDate){
          RAW.BTC.push([w.date,w.price,50]);
          added++;
        }
      });
      if(added>0){updated++;fetchLog.push('✓ BTC +'+added+'周');}
    }
  }catch(e){}
  
  if(updated>0)histLastFetch=now;
  return{updated:updated};
}

function mergeWeekly(rawArr,timestamps,closes){
  // rawArr is [[date,price,sentiment],...]
  // Get last embedded date
  var lastDate=rawArr.length>0?rawArr[rawArr.length-1][0]:'2000-01-01';
  var added=0;
  for(var i=0;i<timestamps.length;i++){
    if(closes[i]===null||closes[i]===undefined)continue;
    var dt=new Date(timestamps[i]*1000);
    var ds=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    if(ds>lastDate){
      rawArr.push([ds,Math.round(closes[i]*100)/100,50]);
      added++;
    }
  }
  return added;
}

async function fetchFRED(){
  const now=Date.now();
  if(now-fredLastFetch<6*3600*1000&&fredLastFetch>0)return{updated:0,src:'cached'};

  const proxies=['https://corsproxy.io/?url=','https://api.allorigins.win/raw?url='];
  const seriesIds=['T10Y2Y','BAMLH0A0HYM2','USSLIND'];
  let updated=0,usedProxy='';

  async function fetchOneSeries(id){
    const fredUrl='https://fred.stlouisfed.org/graph/fredgraph.csv?id='+id+'&cosd=2024-01-01';
    for(const px of proxies){
      try{
        const ctrl=new AbortController();
        const timer=setTimeout(()=>ctrl.abort(),5000);
        const r=await fetch(px+encodeURIComponent(fredUrl),{signal:ctrl.signal});
        clearTimeout(timer);
        if(r.ok){
          const csv=await r.text();
          usedProxy=px.includes('corsproxy')?'corsproxy':'allorigins';
          return csv;
        }
      }catch(e){}
    }
    return null;
  }

  try{
    const results=await Promise.all(seriesIds.map(id=>fetchOneSeries(id)));
    const targets=[ECON_YC,ECON_HY,ECON_LEI];
    results.forEach((csv,i)=>{
      if(csv){
        const n=parseFredCSV(csv,seriesIds[i]);
        if(n>0)updated++;
      }
    });
  }catch(e){fetchLog.push('FRED error: '+e.message);}
  if(updated>0)fredLastFetch=now;
  return{updated,src:usedProxy};
}

function parseFredCSV(csv,seriesId){
  // FRED CSV format: DATE,VALUE (header) then rows
  const lines=csv.trim().split('\n');
  if(lines.length<2)return 0;
  let count=0;
  const target=seriesId==='T10Y2Y'?ECON_YC:seriesId==='BAMLH0A0HYM2'?ECON_HY:ECON_LEI;
  for(let i=1;i<lines.length;i++){
    const parts=lines[i].split(',');
    if(parts.length<2)continue;
    const date=parts[0].trim();
    const val=parts[1].trim();
    if(!date||val==='.'||val==='')continue;
    const num=parseFloat(val);
    if(isNaN(num))continue;
    const ym=date.substring(0,7); // "2024-03"
    target[ym]=num;
    count++;
  }
  return count;
}

  const maColor=isBTC()?'rgba(247,147,26,0.3)':'rgba(255,120,73,0.3)';
  const maLabel=isBTC()?'200周线':'均线';
  return '<svg width="'+W+'" height="'+HH+'" style="display:block;max-width:100%">'+g+dl+'<path d="'+pP+'" fill="none" stroke="rgba(100,140,255,0.6)" stroke-width="1.5"/><path d="'+mP+'" fill="none" stroke="'+maColor+'" stroke-width="1" stroke-dasharray="4,4"/>'+fs+ts+'</svg>';
}

      ["1月","3月","半年","1年"].forEach(p=>{const r=s.future[p];
        if(r===null)o+='<td style="padding:3px 4px;text-align:right;color:rgba(255,255,255,0.1)">—</td>';
        else{const c=r>0?"#00e5a0":"#ff2d55";o+='<td class="m" style="padding:3px 4px;text-align:right;color:'+c+'">'+(r>0?"+":"")+r+'%</td>';}});
      o+='</tr>';});
    o+='</tbody></table></div>';
    if(filtered.length){
      o+='<details style="margin-top:8px"><summary style="font-size:10px;color:#ff2d55;cursor:pointer">🚫 '+filtered.length+'个已过滤</summary><div style="margin-top:6px;font-size:9px">';
      filtered.forEach(s=>{
        const r3=s.future["3月"],r1=s.future["1年"];
        const tags=s.blockedLayers.map(l=>l==='均线'?'<span class="tag tag-ma">均线</span>':'<span class="tag tag-econ">经济</span>').join('')+(s.blockedLayers.length>1?'<span class="tag tag-both">双重</span>':'');
        o+='<div style="padding:3px 6px;border-bottom:1px solid rgba(255,255,255,0.03)"><span class="m" style="color:rgba(255,255,255,0.3)">'+s.date+' $'+s.price.toLocaleString()+'</span> '+tags;
        if(r3!==null)o+=' <span class="m" style="color:'+(r3>=0?"#00e5a0":"#ff2d55")+'">3月'+(r3>=0?"+":"")+r3+'%</span>';
        if(r1!==null)o+=' <span class="m" style="color:'+(r1>=0?"#00e5a0":"#ff2d55")+'">1年'+(r1>=0?"+":"")+r1+'%</span>';
        o+='</div>';});
      o+='</div></details>';}
    o+='</div>';
    // System doc
    o+='<div class="P" style="border-color:rgba(255,255,255,0.04)"><div style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.3);margin-bottom:4px">系统说明</div><div style="font-size:10px;color:rgba(255,255,255,0.2);line-height:1.8">';
    o+='<b style="color:#f0c040">触发</b>: 情绪≤'+rp_stock.sent+' + 回撤≥'+rp_stock.dd+'%<br>';
    o+='<b style="color:#f0c040">过滤层1</b>: '+rp_stock.ma+'周均线 (12周内站上过=放行)<br>';
    o+='<b style="color:#f0c040">过滤层2</b>: 经济≥2分 (YC倒挂-1/HY>6%-1/LEI<0-1)<br>';
    o+='<b style="color:rgba(255,255,255,0.4)">已知局限</b>: 合成情绪有循环论证 / FRED月度精度 / 非完整策略回测 / 样本有限 / 历史≠未来</div></div>';
  }
  o+='</div>';
  document.getElementById("ct").innerHTML=o;
  renderExecBar();
}

// ════════════════════════════════════════
// APPLY PARAMS
// ════════════════════════════════════════
function ap(){
  const v=id=>{const el=document.getElementById(id);return el?parseFloat(el.value):NaN;};
  if(isBTC()){
    const r=v("p_rsi"),d=v("p_d"),c=v("p_c"),a=v("p_ahr");
    if(!isNaN(r))rp_btc.rsi=Math.round(r);
    if(!isNaN(d))rp_btc.dd=Math.round(d);
    if(!isNaN(c))rp_btc.cool=Math.round(c);
    if(!isNaN(a)&&a>0&&a<2)rp_btc.ahr999=Math.round(a*100)/100;
  } else {
    const s=v("p_s"),d=v("p_d"),c=v("p_c"),m=v("p_m");
    if(!isNaN(s))rp_stock.sent=Math.round(s);
    if(!isNaN(d))rp_stock.dd=Math.round(d);
    if(!isNaN(c))rp_stock.cool=Math.round(c);
    if(!isNaN(m))rp_stock.ma=Math.round(m);
  }
  saveParams();  // 改完立刻存到浏览器
  run();
}

function render(){
  document.getElementById("tabs").innerHTML=["SPY","QQQ","BTC"].map(a=>{
    const cls=asset===a?"on":"";
    const extra=a==='BTC'&&asset==='BTC'?' btc':'';
    return '<button class="ab '+cls+extra+'" data-action="tab" data-asset="'+a+'">'+a+'</button>';
  }).join("");
  run();
}

document.addEventListener("keydown",function(e){if(e.key==="Enter")ap();});

// ════════════════════════════════════════
// EVENT DELEGATION — no inline onclick, works in sandboxed webviews
// ════════════════════════════════════════
function handleAction(actionEl){
  if(!actionEl)return;
  var action=actionEl.getAttribute("data-action");
  if(!action)return;
  if(action==="refresh"){doRefresh();}
  else if(action==="scan"){ap();}
  else if(action==="apply"){applyToExec();}
  else if(action==="tab"){
    var a=actionEl.getAttribute("data-asset");
    if(a){asset=a;syncCurrentParams();render();}
  }
  else if(action==="toggle-stock-ma"){rp_stock.useMA=!rp_stock.useMA;saveParams();run();renderExecBar();}
  else if(action==="toggle-stock-econ"){rp_stock.useEcon=!rp_stock.useEcon;saveParams();run();renderExecBar();}
  else if(action==="toggle-btc-ma"){rp_btc.ma200w=!rp_btc.ma200w;saveParams();run();renderExecBar();}
  else if(action==="reset-params"){resetParams();}
}

// Click for desktop
document.addEventListener("click",function(e){
  var el=e.target.closest("[data-action]");
  if(el)handleAction(el);
});

// Touch for mobile — use touchend to avoid double-fire
var touchMoved=false;
document.addEventListener("touchstart",function(){touchMoved=false;},{passive:true});
document.addEventListener("touchmove",function(){touchMoved=true;},{passive:true});
document.addEventListener("touchend",function(e){
  if(touchMoved)return;
  var el=e.target.closest("[data-action]");
  if(el){e.preventDefault();handleAction(el);}
});

// Also bind refresh button by ID as fallback
document.getElementById("btnRefresh").addEventListener("click",function(){doRefresh();});
document.getElementById("btnRefresh").addEventListener("touchend",function(e){e.preventDefault();doRefresh();});

render();

// Init: single fetch with retry, then auto-refresh
var autoTimer=null;
function startAutoRefresh(){
  if(autoTimer)clearInterval(autoTimer);
  autoTimer=setInterval(doRefresh, 5*60*1000);
}
setTimeout(function(){doRefresh();startAutoRefresh();}, 300);
</script>
